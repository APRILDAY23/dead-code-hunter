name: Dead Code Bot

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: write
  contents: read

jobs:
  dead-code-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dch
        run: npm install -g dead-code-hunter

      - name: Run analysis
        run: dch analyze --format json --output dch-report.json || true

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('dch-report.json')) return;

            const report = JSON.parse(fs.readFileSync('dch-report.json', 'utf-8'));
            const count = report.deadSymbols?.length ?? 0;
            const ws = process.env.GITHUB_WORKSPACE + '/';

            const rows = (report.deadSymbols ?? []).slice(0, 10).map(s =>
              `| \`${s.definition.name}\` | ${s.definition.kind} | \`${s.definition.file.replace(ws, '')}:${s.definition.line}\` | ${s.reason} |`
            ).join('\n');

            const table = count > 0
              ? `\n\n| Symbol | Kind | Location | Reason |\n|--------|------|----------|--------|\n${rows}` +
                (count > 10 ? `\n\n_…and ${count - 10} more. Run \`dch analyze\` locally for the full list._` : '')
              : '';

            const body = count === 0
              ? '✅ **Dead Code Hunter** · No dead code found in this PR!'
              : `⚠️ **Dead Code Hunter** · Found **${count}** dead symbol(s)${table}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body?.includes('Dead Code Hunter'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
