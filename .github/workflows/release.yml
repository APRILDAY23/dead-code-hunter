name: Release

on:
  push:
    branches:
      - develop

permissions:
  contents: write

jobs:
  release:
    name: Publish to npm + GitHub Release
    runs-on: ubuntu-latest
    if: github.actor == 'APRILDAY23'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: |
          npm run build --workspace packages/core
          npm run build --workspace packages/cli

      # ── Compute next version from latest git tag ─────────────────────────────
      - name: Compute version
        id: version
        run: |
          LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          LATEST=${LATEST:-v1.0.0}
          CURRENT="${LATEST#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW="$MAJOR.$MINOR.$((PATCH + 1))"

          # Skip if this version already exists on npm
          if npm view dead-code-hunter@$NEW version 2>/dev/null | grep -q "$NEW"; then
            echo "Version $NEW already published - skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

          npm version "$NEW" --no-git-tag-version --workspace packages/core
          npm version "$NEW" --no-git-tag-version --workspace packages/cli
          npm version "$NEW" --no-git-tag-version --workspace packages/vscode

          echo "Bumped $CURRENT → $NEW"

      # ── Publish to npm FIRST (tag only created on success) ───────────────────
      - name: Publish core to npm
        if: steps.version.outputs.skip != 'true'
        run: npm publish --workspace packages/core --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish CLI to npm
        if: steps.version.outputs.skip != 'true'
        run: npm publish --workspace packages/cli --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ── Commit version bump + tag (only after successful publish) ────────────
      - name: Commit & tag version bump
        if: steps.version.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/*/package.json
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }} [skip ci]"
          git tag ${{ steps.version.outputs.tag }}
          git push origin develop --follow-tags

      # ── GitHub Release ────────────────────────────────────────────────────────
      - name: Create GitHub Release
        if: steps.version.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Dead Code Hunter ${{ steps.version.outputs.tag }}"
          generate_release_notes: true
          body: |
            ## Install

            **CLI (npm)**
            ```bash
            npm install -g dead-code-hunter@${{ steps.version.outputs.version }}
            ```

            **Quick run (no install)**
            ```bash
            npx dead-code-hunter@${{ steps.version.outputs.version }} analyze
            ```
