name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Publish to npm + GitHub Release
    runs-on: ubuntu-latest

    if: github.actor == 'APRILDAY23'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build --workspaces --if-present

      # ── Extract version from tag ─────────────────────────────────────────────
      - name: Extract version
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$TAG" == *"-"* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      # ── Sync versions across all packages ───────────────────────────────────
      - name: Bump package versions
        run: |
          VERSION=${{ steps.version.outputs.version }}
          npm version "$VERSION" --no-git-tag-version --workspace packages/core
          npm version "$VERSION" --no-git-tag-version --workspace packages/cli

      # ── Publish @dead-code-hunter/core to npm ───────────────────────────────
      - name: Publish core to npm
        run: npm publish --workspace packages/core --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ── Publish dead-code-hunter CLI to npm ─────────────────────────────────
      - name: Publish CLI to npm
        run: npm publish --workspace packages/cli --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ── Create GitHub Release ────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Dead Code Hunter ${{ steps.version.outputs.tag }}"
          generate_release_notes: true
          prerelease: ${{ steps.version.outputs.prerelease }}
          body: |
            ## Install

            **CLI (npm)**
            ```bash
            npm install -g dead-code-hunter@${{ steps.version.outputs.version }}
            ```

            **Quick run (no install)**
            ```bash
            npx dead-code-hunter analyze
            ```

            ---
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
